<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MryoniSade</title>
  <style>
    :root {
      --bg: #f5f2eb;
      --text: #1f2933;
      --muted: #52606d;
      --card: #ffffff;
      --accent: #0b7285;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 10% -10%, #d9efe6 0%, transparent 60%),
        radial-gradient(1000px 500px at 100% 110%, #e5f1ff 0%, transparent 60%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid #d9e2ec;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 3.8vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to mryonisade.github.io</h1>
    <p>
      Your GitHub Pages site is now live with a root
      <a href="/">index.html</a> page.
    </p>
  </main>
</body>
</html>
